<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <button id="themeToggle" class="theme-btn">🌙</button>
        <input type="text" id="display" disabled>

        <div class="buttons">
            <button onclick="calculateFunc('sin')">sin</button>
            <button onclick="calculateFunc('cos')">cos</button>
            <button onclick="calculateFunc('log')">log</button>
            <button onclick="calculateFunc('sqrt')">√</button>

            <button onclick="clearDisplay()">C</button>
            <button onclick="deleteLast()">DEL</button>
            <button onclick="appendValue('%')">%</button>
            <button onclick="appendValue('/')">÷</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('*')">x</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('-')">-</button>

            <button onclick="appendValue('(')">(</button>
            <button onclick="appendValue(')')">)</button>
            <button onclick="appendValue('^')">^</button>
            <button onclick="appendValue('π')">π</button>
            <button onclick="appendFactorial()">!</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <button onclick="appendValue('0')" class="zero">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
        
    </div>

    <div class="history">
        <div class="history-header">
            <h3>History</h3>
            <button onclick="clearHistory()">Clear</button>
        </div>
        <ul id="historyList"></ul>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
